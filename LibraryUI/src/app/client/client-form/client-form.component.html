<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card bg-light">
                <div class="card-header">
                    <h4>{{ isEditMode ? 'Edit Client' : 'Add Client' }}</h4>
                </div>
                <div class="card-body">
                    <form [formGroup]="clientForm" (ngSubmit)="onSubmit()">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Client Name *</label>
                                <input type="text" class="form-control" formControlName="clientName">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number *</label>
                                <input type="text" class="form-control" formControlName="phoneNumber">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email *</label>
                                <input type="email" class="form-control" formControlName="email">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Department *</label>
                                <input type="text" class="form-control" formControlName="department">
                            </div>
                        </div>
                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-success me-2" [disabled]="clientForm.invalid">
                                {{ isEditMode ? 'Update Client' : 'Save Client' }}
                            </button>
                            <button type="button" class="btn btn-secondary" routerLink="/clients">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
