<div class="container mt-4 position-relative">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Book List</h2>
        <div *ngIf="isLoading" class="spinner-border spinner-border-sm text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    
    <div class="d-flex justify-content-between align-items-center mb-3">
        <button class="btn btn-primary" routerLink="/books/add">Add Book</button>
    </div>

    <!-- Search and Sort Controls -->
    <div class="row mb-3">
        <div class="col-md-7">
            <input [(ngModel)]="searchTerm" (ngModelChange)="onSearch()" class="form-control" placeholder="Search Book Title or Author...">
        </div>
        <div class="col-md-5">
            <select [(ngModel)]="sortBy" (ngModelChange)="onSortChange()" class="form-select">
                <option value="">Sort By</option>
                <option value="title-az">Title: A-Z</option>
                <option value="title-za">Title: Z-A</option>
                <option value="author-az">Author: A-Z</option>
                <option value="author-za">Author: Z-A</option>
            </select>
        </div>
    </div>
    
    <div class="table-responsive">
        <table class="table table-sm table-hover table-bordered shadow-sm">
            <thead class="table-light">
                <tr>
                    <th (click)="toggleSort('title')" class="sort-header" [class.active]="sortBy === 'title-az' || sortBy === 'title-za'">
                        Title
                        <div class="sort-icons">
                            <span [class.active-sort]="sortBy === 'title-az'">▲</span>
                            <span [class.active-sort]="sortBy === 'title-za'">▼</span>
                        </div>
                    </th>
                    <th (click)="toggleSort('author')" class="sort-header" [class.active]="sortBy === 'author-az' || sortBy === 'author-za'">
                        Author
                        <div class="sort-icons">
                            <span [class.active-sort]="sortBy === 'author-az'">▲</span>
                            <span [class.active-sort]="sortBy === 'author-za'">▼</span>
                        </div>
                    </th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let book of books">
                    <td>{{ book.title }}</td>
                    <td>{{ book.author }}</td>
                    <td>
                        <button class="btn btn-sm btn-outline-info me-2" (click)="editBook(book.id)">Edit</button>
                        <button class="btn btn-sm btn-outline-danger" (click)="deleteBook(book.id!)">Delete</button>
                    </td>
                </tr>
                <tr *ngIf="books.length === 0 && !isLoading">
                    <td colspan="3" class="text-center text-muted">No books found.</td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Pagination Controls -->
    <div *ngIf="totalCount > 0" class="pagination-container mt-3">
        <div class="d-flex justify-content-between align-items-center w-100 mb-2">
            <small class="text-muted">
                Showing {{ (currentPage - 1) * pageSize + 1 }} - {{ Math.min(currentPage * pageSize, totalCount) }} of {{ totalCount }}
            </small>
            <div class="d-flex align-items-center gap-2">
                <small class="text-muted text-nowrap">Page Size:</small>
                <select [(ngModel)]="pageSize" (change)="onPageSizeChange()" class="form-select form-select-sm" style="width: auto;">
                    <option [ngValue]="5">5</option>
                    <option [ngValue]="10">10</option>
                    <option [ngValue]="20">20</option>
                    <option [ngValue]="50">50</option>
                </select>
            </div>
        </div>

        <nav aria-label="Page navigation">
            <ul class="pagination pagination-sm justify-content-center mb-2">
                <li class="page-item" [class.disabled]="currentPage === 1">
                    <button class="page-link" (click)="onPageChange(1)" [disabled]="currentPage === 1">«</button>
                </li>
                <li class="page-item" [class.disabled]="currentPage === 1">
                    <button class="page-link" (click)="onPageChange(currentPage - 1)" [disabled]="currentPage === 1">Prev</button>
                </li>

                <li *ngFor="let p of visiblePages" class="page-item" [class.active]="currentPage === p">
                    <button class="page-link" (click)="onPageChange(p)">{{p}}</button>
                </li>

                <li class="page-item" [class.disabled]="currentPage === totalPages">
                    <button class="page-link" (click)="onPageChange(currentPage + 1)" [disabled]="currentPage === totalPages">Next</button>
                </li>
                <li class="page-item" [class.disabled]="currentPage === totalPages">
                    <button class="page-link" (click)="onPageChange(totalPages)" [disabled]="currentPage === totalPages">»</button>
                </li>
            </ul>
        </nav>

        <div class="input-group input-group-sm mb-0" style="max-width: 150px;">
            <span class="input-group-text">Go to</span>
            <input type="number" [(ngModel)]="jumpPage" (keyup.enter)="onJumpPage()" class="form-control" [max]="totalPages" min="1">
            <button class="btn btn-outline-secondary" (click)="onJumpPage()">Go</button>
        </div>
    </div>
</div>
