<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card bg-light">
                <div class="card-header">
                    <h4>{{ isEditMode ? 'Edit Book' : 'Add Book' }}</h4>
                </div>
                <div class="card-body">
                    <form [formGroup]="bookForm" (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label class="form-label">Book Title *</label>
                            <input type="text" class="form-control" formControlName="title">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Author *</label>
                            <input type="text" class="form-control" formControlName="author">
                        </div>
                        <div class="mt-4 text-end">
                            <button type="submit" class="btn btn-success me-2" [disabled]="bookForm.invalid">
                                {{ isEditMode ? 'Update Book' : 'Save Book' }}
                            </button>
                            <button type="button" class="btn btn-secondary" routerLink="/books">Cancel</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
